name: Build Release
on:
  push:
    branches:
      - master
      - '1.9-dev'
      - 'psy/gh-ci'
env:
  MYSQL_VERSION: '5.5'
jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - platform: windows
            os: windows-2022
            os_short: win
          - platform: linux
            os: ubuntu-latest
            os_short: linux
            container_image: ghcr.io/alliedmodders/build-containers/debian10:latest
      fail-fast: false
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    container:
      image: ${{ matrix.container_image }}
    steps:
      - name: Checkout AMX Mod X
        uses: actions/checkout@v6
        with:
          path: amxmodx
          fetch-depth: 0
          submodules: recursive

      # Workaround for github.workspace mismatch in containerized jobs.
      # See https://github.com/actions/runner/issues/2058
      - name: Resolve paths
        id: path_helper
        shell: bash
        run: |
          echo "dependencies=$GITHUB_WORKSPACE/dependencies" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v5
        env:
          cache-name: amxx-deps
        with:
          path: ${{ steps.path_helper.outputs.dependencies }}
          key: ${{ runner.os }}-build-${{ env.cache-name }}-mysql${{ env.MYSQL_VERSION }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-

      - name: Install NASM (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          # nasm is pre-installed in the build container; this is a fallback
          command -v nasm || (apt-get update -qq && apt-get install -y -qq nasm)

      - name: Install dependencies (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          mkdir -p '${{ steps.path_helper.outputs.dependencies }}'
          cd '${{ steps.path_helper.outputs.dependencies }}'

          # Satisfy checkout-deps requirement for an "amxmodx" folder.
          mkdir -p amxmodx
          ../amxmodx/support/checkout-deps.sh

      - name: Install MSVC v140 toolset
        if: startsWith(matrix.os, 'windows')
        shell: powershell
        run: |
          $installPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
          $vsInstaller = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\setup.exe"
          Write-Host "Installing v140 toolset to $installPath ..."
          $proc = Start-Process -FilePath $vsInstaller -ArgumentList `
            "modify", "--installPath", $installPath, `
            "--add", "Microsoft.VisualStudio.Component.VC.140", `
            "--quiet", "--norestart", "--wait" `
            -Wait -PassThru
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if ($proc.ExitCode -ne 0 -and $proc.ExitCode -ne 3010) {
            throw "VS installer failed with exit code $($proc.ExitCode)"
          }
          # Verify toolset was installed
          $toolset = Get-ChildItem "$installPath\VC\Tools\MSVC\14.0*" -Directory -ErrorAction SilentlyContinue
          if ($toolset) {
            Write-Host "Found v140 toolset: $($toolset.FullName)"
          } else {
            throw "v140 toolset directory not found after installation"
          }

      - name: Setup MSVC (x86, v140)
        if: startsWith(matrix.os, 'windows')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86
          toolset: '14.0'

      - name: Configure XP targeting
        if: startsWith(matrix.os, 'windows')
        shell: cmd
        run: |
          echo CL=/D_USING_V110_SDK71_ %%CL%%>> %GITHUB_ENV%
          echo LINK=/SUBSYSTEM:CONSOLE,5.01 %%LINK%%>> %GITHUB_ENV%

      - name: Setup NASM (Windows)
        if: startsWith(matrix.os, 'windows')
        uses: ilammy/setup-nasm@v1

      - name: Install dependencies (Windows)
        if: startsWith(matrix.os, 'windows')
        shell: bash
        run: |
          DEPS='${{ steps.path_helper.outputs.dependencies }}'
          mkdir -p "$DEPS"
          cd "$DEPS"

          if [ ! -d "metamod-am" ]; then
            git clone https://github.com/alliedmodders/metamod-hl1 metamod-am
          fi
          if [ ! -d "hlsdk" ]; then
            git clone https://github.com/alliedmodders/hlsdk
          fi
          if [ ! -d "mysql-${{ env.MYSQL_VERSION }}" ]; then
            curl -sSL -o mysql-connector.zip \
              "https://downloads.mysql.com/archives/get/p/19/file/mysql-connector-c-6.1.1-win32.zip"
            7z x mysql-connector.zip
            mv mysql-connector-c-6.1.1-win32 "mysql-${{ env.MYSQL_VERSION }}"
            rm mysql-connector.zip
          fi

          if [ ! -d "ambuild" ]; then
            git clone https://github.com/alliedmodders/ambuild
          fi
          pip install ./ambuild

      - name: Build
        working-directory: amxmodx
        shell: bash
        run: |
          DEPS='${{ steps.path_helper.outputs.dependencies }}'
          mkdir build
          cd build
          python3 ../configure.py \
            --enable-optimize \
            "--metamod=$DEPS/metamod-am" \
            "--hlsdk=$DEPS/hlsdk" \
            "--mysql=$DEPS/mysql-${{ env.MYSQL_VERSION }}"
          ambuild

      - name: Package
        id: package
        working-directory: amxmodx/build
        shell: bash
        run: |
          version_base=$(cat ../product.version)
          version_base=${version_base%-dev}
          version_rev=$(git rev-list --count HEAD)
          version="${version_base}.${version_rev}"
          expanded_version="${version_base}-git${version_rev}"

          packages=(base cstrike dod esf ns tfc ts)
          release_dir="release"
          mkdir -p "$release_dir"

          for pkg in "${packages[@]}"; do
            pkg_dir="packages/$pkg"
            if [ ! -d "$pkg_dir" ]; then
              echo "Warning: package directory $pkg_dir not found, skipping"
              continue
            fi

            if [ "${{ matrix.platform }}" == "windows" ]; then
              filename="amxmodx-${expanded_version}-${pkg}-${{ matrix.platform }}.zip"
              (cd "$pkg_dir" && 7z a "../../${release_dir}/${filename}" addons)
            else
              filename="amxmodx-${expanded_version}-${pkg}-${{ matrix.platform }}.tar.gz"
              tar zcf "${release_dir}/${filename}" -C "$pkg_dir" addons
            fi
          done

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "expanded_version=$expanded_version" >> $GITHUB_OUTPUT

